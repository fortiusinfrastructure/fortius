backend:
  name: proxy
  proxy_url: http://127.0.0.1:8081/api/v1
  branch: main

media_folder: public/images/uploads
public_folder: /images/uploads

site_url: http://localhost:3000
logo_url: /ieam-logo-new.png

locale: es
publish_mode: editorial_workflow
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: '-'

collections:
  - name: research
    label: Investigación · Piloto Markdown
    label_singular: Documento de investigación
    folder: src/content/research
    create: true
    extension: md
    format: frontmatter
    preview_path: analisis/{{slug}}
    sortable_fields: [publishDate, title, type]
    fields:
      - { label: Slug, name: slug, widget: string }
      - { label: Título ES, name: title, widget: string }
      - { label: Título EN, name: title_en, widget: string, required: false }
      - { label: Subtítulo ES, name: subtitle, widget: text }
      - { label: Subtítulo EN, name: subtitle_en, widget: text, required: false }
      - { label: Tipo ES, name: type, widget: string, default: Policy Brief }
      - { label: Tipo EN, name: type_en, widget: string, required: false }
      - { label: Content kind, name: contentKind, widget: select, options: [analisis, policy, infografia, reseña-evento, entrevista, nota-prensa] }
      - { label: Categoría ES, name: category, widget: string }
      - { label: Categoría EN, name: category_en, widget: string, required: false }
      - { label: Fecha publicación, name: publishDate, widget: string, hint: "Ejemplo: 14 Abr 2026" }
      - { label: Tiempo lectura, name: readTime, widget: string, default: 10 min }
      - { label: Hero image ES, name: heroImage, widget: image }
      - { label: Hero image EN, name: heroImage_en, widget: image, required: false }
      - { label: Main image ES, name: mainImage, widget: image }
      - { label: Main image EN, name: mainImage_en, widget: image, required: false }
      - { label: Caption ES, name: mainImageCaption, widget: string }
      - { label: Caption EN, name: mainImageCaption_en, widget: string, required: false }
      - { label: Autor ES, name: authorName, widget: string }
      - { label: Autor EN, name: authorName_en, widget: string, required: false }
      - { label: Rol ES, name: authorRole, widget: string }
      - { label: Rol EN, name: authorRole_en, widget: string, required: false }
      - { label: Imagen autor, name: authorImage, widget: image }
      - { label: Bio ES, name: authorBio, widget: text, required: false }
      - { label: Bio EN, name: authorBio_en, widget: text, required: false }
      - { label: Pull quote ES, name: pullQuote, widget: text, required: false }
      - { label: Pull quote EN, name: pullQuote_en, widget: text, required: false }
      - label: Materiales
        name: materials
        widget: list
        required: false
        fields:
          - { label: Label ES, name: label, widget: string }
          - { label: Label EN, name: label_en, widget: string, required: false }
          - { label: URL, name: url, widget: string }
      - { label: Contenido EN, name: content_en, widget: markdown, required: false }
      - { label: Contenido ES, name: body, widget: markdown }
